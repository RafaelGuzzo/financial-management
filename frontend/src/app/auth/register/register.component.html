<div class="bg-light min-vh-100 d-flex flex-row align-items-center">
  <c-container>
    <c-row class="justify-content-center">
      <c-col md="9" lg="7" xl="6">
        <c-card class="mx-4">
          <c-card-body class="p-4">
            <form cForm [formGroup]="registerForm" (ngSubmit)="onSubmit()">
              <h1>Criar Conta</h1>
              <p class="text-medium-emphasis">Preencha os dados para se registrar</p>

              <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
                {{ errorMessage }}
              </div>

              <c-input-group class="mb-3">
                <span cInputGroupText>
                  <svg cIcon name="cil-user"></svg>
                </span>
                <input
                  autoComplete="name"
                  cFormControl
                  placeholder="Nome"
                  formControlName="name"
                />
              </c-input-group>

              <c-input-group class="mb-3">
                <span cInputGroupText>
                  <svg cIcon name="cil-envelope-open"></svg>
                </span>
                <input
                  autoComplete="email"
                  cFormControl
                  placeholder="Email"
                  formControlName="email"
                  type="email"
                />
              </c-input-group>

              <c-input-group class="mb-3">
                <span cInputGroupText>
                  <svg cIcon name="cil-lock-locked"></svg>
                </span>
                <input
                  autoComplete="new-password"
                  cFormControl
                  placeholder="Senha"
                  formControlName="password"
                  type="password"
                />
              </c-input-group>

              <div class="d-grid">
                <button cButton color="success" type="submit" [disabled]="loading || registerForm.invalid">
                  <span *ngIf="!loading">Registrar</span>
                  <span *ngIf="loading">Registrando...</span>
                </button>
              </div>

              <div class="mt-3 text-center">
                <a routerLink="/login" class="text-decoration-none">
                  Já tem conta? Faça login
                </a>
              </div>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
