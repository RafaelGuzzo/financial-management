<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col lg="10" xl="8">
        <c-card-group>
          <!-- Card de Login -->
          <c-card class="p-4">
            <c-card-body>
              <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <h1>Gestão Financeira</h1>
                <p class="text-body-secondary">Faça login para continuar</p>

                <!-- Email -->
                <c-input-group class="mb-3">
                  <span cInputGroupText>
                    <svg cIcon name="cilEnvelopeClosed"></svg>
                  </span>
                  <input
                    cFormControl
                    placeholder="Email"
                    type="email"
                    formControlName="email"
                    required
                    autoComplete="username"
                  />
                </c-input-group>
                <div *ngIf="loginForm.get('email')?.touched">
                  <small class="text-danger" *ngIf="loginForm.get('email')?.hasError('required')">
                    Email é obrigatório
                  </small>
                  <small class="text-danger" *ngIf="loginForm.get('email')?.hasError('email')">
                    Insira um email válido
                  </small>
                </div>

                <!-- Senha -->
                <c-input-group class="mb-4">
                  <span cInputGroupText>
                    <svg cIcon name="cilLockLocked"></svg>
                  </span>
                  <input
                    cFormControl
                    placeholder="Senha"
                    type="password"
                    formControlName="password"
                    required
                    autoComplete="current-password"
                  />
                </c-input-group>
                <div *ngIf="loginForm.get('password')?.touched">
                  <small class="text-danger" *ngIf="loginForm.get('password')?.hasError('required')">
                    Senha é obrigatória
                  </small>
                </div>

                <!-- Ações -->
                <c-row>
                  <c-col xs="6">
                    <button
                      cButton
                      color="primary"
                      class="px-4"
                      type="submit"
                      [disabled]="loading || loginForm.invalid"
                    >
                      <span *ngIf="!loading">Entrar</span>
                      <c-spinner *ngIf="loading" size="sm" variant="grow"></c-spinner>
                    </button>
                  </c-col>
                  <c-col class="text-end" xs="6">
                    <button cButton class="px-0" color="link">
                      Esqueci minha senha
                    </button>
                  </c-col>
                </c-row>
              </form>
            </c-card-body>
          </c-card>

          <!-- Card lateral -->
          <c-card [ngStyle]="{'minWidth.%': 44}" class="text-white bg-primary py-5">
            <c-card-body class="text-center">
              <div>
                <h2>Criar conta</h2>
                <p>Cadastre-se e comece a gerenciar suas finanças de forma prática e segura.</p>
                <button
                  [active]="true"
                  cButton
                  class="mt-3"
                  color="light"
                  routerLink="/register"
                >
                  Registrar agora
                </button>
              </div>
            </c-card-body>
          </c-card>
        </c-card-group>
      </c-col>
    </c-row>
  </c-container>
</div>
