<div class="container-fluid">
  <c-row>
    <c-col xs="12">
      <c-card class="mb-4 shadow-sm">
        <c-card-header class="d-flex justify-content-between align-items-center bg-light">
          <h5 class="mb-0 fw-semibold">Gerenciar Categorias</h5>
          <button cButton color="primary" size="sm" (click)="toggleForm()">
            <svg cIcon name="cil-plus" class="me-1"></svg>
            {{ showForm ? 'Cancelar' : 'Adicionar Categoria' }}
          </button>
        </c-card-header>
        <c-card-body>
          <!-- Formulário -->
          <div *ngIf="showForm" class="mb-4 p-3 border rounded bg-light">
            <form cForm [formGroup]="form" (ngSubmit)="onSave()">
              <c-row class="g-3">
                <c-col md="8">
                  <label cLabel for="name" class="small fw-bold">Nome da Categoria *</label>
                  <input cFormControl id="name" type="text" formControlName="name" placeholder="Ex: Alimentação, Moradia, Lazer..." />
                </c-col>
                <c-col md="4">
                  <label cLabel for="color" class="small fw-bold">Cor de Destaque *</label>
                  <div class="d-flex gap-2">
                    <input cFormControl id="color" type="color" formControlName="color" style="width: 60px; height: 38px; padding: 2px;" />
                    <input cFormControl type="text" [value]="form.get('color')?.value" readonly style="flex-grow: 1;" />
                  </div>
                </c-col>
                <c-col xs="12" class="mt-4">
                  <button cButton color="success" type="submit" [disabled]="form.invalid" class="me-2">
                    <svg cIcon name="cil-check" class="me-1"></svg> Salvar
                  </button>
                  <button cButton color="secondary" type="button" (click)="cancelEdit()">
                    <svg cIcon name="cil-x" class="me-1"></svg> Cancelar
                  </button>
                </c-col>
              </c-row>
            </form>
          </div>

          <!-- Tabela -->
          <div class="table-responsive">
            <table cTable striped hover class="mb-0">
              <thead class="table-light">
                <tr>
                  <th class="cursor-pointer" (click)="sortByName()">
                    Nome 
                    <svg cIcon name="cil-sort-alpha-down" size="sm" class="ms-1"></svg>
                  </th>
                  <th style="width: 150px;">Cor</th>
                  <th class="text-center" style="width: 120px;">Ações</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let category of categories">
                  <td class="align-middle">
                    <svg cIcon name="cil-tag" class="me-2 text-muted"></svg>
                    {{ category.name }}
                  </td>
                  <td class="align-middle">
                    <div class="d-flex align-items-center">
                      <div [style.background-color]="category.color" 
                           style="width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px #ddd;">
                      </div>
                      <span class="ms-2 small font-monospace text-muted">{{ category.color }}</span>
                    </div>
                  </td>
                  <td class="text-center align-middle">
                    <button cButton color="info" size="sm" variant="ghost" (click)="editCategory(category)" title="Editar">
                      <svg cIcon name="cil-pencil"></svg>
                    </button>
                    <button cButton color="danger" size="sm" variant="ghost" (click)="deleteCategory(category.id!)" title="Excluir">
                      <svg cIcon name="cil-trash"></svg>
                    </button>
                  </td>
                </tr>
                <tr *ngIf="categories.length === 0">
                  <td colspan="3" class="text-center py-4 text-muted">Nenhuma categoria cadastrada</td>
                </tr>
              </tbody>
            </table>
          </div>
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>
</div>
